<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#12171A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Tracker">
<title>Daily Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12171A;
    --surface:#1B2226;
    --surface-2:#212A2F;
    --ink:#EDE7DA;
    --ink-soft:#8E9894;
    --teal:#52BF98;
    --teal-light:rgba(82,191,152,0.14);
    --gold:#E3B765;
    --gold-light:rgba(227,183,101,0.16);
    --sky:#79ACDE;
    --sky-light:rgba(121,172,222,0.14);
    --rose:#D98C8C;
    --rose-light:rgba(217,140,140,0.16);
    --line:#2D363A;
    --shadow:0 1px 2px rgba(0,0,0,0.35),0 6px 20px rgba(0,0,0,0.4);
    --check-mark:#12171A;
    --lavender:#A78BFA;
    --lavender-light:rgba(167,139,250,0.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.035) 1px,transparent 0);
    background-size:22px 22px;
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:28px 16px 60px;
  }
  .wrap{max-width:1080px;margin:0 auto;}

  /* ── Header ── */
  header.top{text-align:center;margin-bottom:24px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:600;}
  h1{font-family:'Lora',serif;font-weight:600;font-size:clamp(28px,5vw,40px);margin:6px 0;color:var(--teal);}
  .sub{color:var(--ink-soft);font-size:14px;max-width:540px;margin:0 auto;}
  .syncbadge{
    display:inline-flex;align-items:center;gap:6px;margin-top:12px;
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);
    background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px 12px;
  }
  .syncbadge .dot{width:8px;height:8px;border-radius:50%;}
  .syncbadge .dot.cloud{background:var(--teal);}
  .syncbadge .dot.local{background:var(--gold);}
  .syncbadge .dot.err{background:var(--rose);}

  /* ── Login gate ── */
  .gate{
    max-width:400px;margin:60px auto;text-align:center;
    background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:36px 28px;box-shadow:var(--shadow);
  }
  .gate h2{font-family:'Lora',serif;font-size:22px;color:var(--ink);margin:0 0 6px;}
  .gate p{color:var(--ink-soft);font-size:13px;margin:0 0 22px;}
  .gate-avatar{
    width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Lora',serif;font-weight:600;font-size:15px;color:var(--check-mark);flex:0 0 auto;
  }
  .gate-avatar.userA{background:var(--teal);}
  .gate-avatar.userB{background:var(--rose);}
  .gate-select,.gate-input{
    width:100%;padding:12px 14px;border-radius:12px;margin-bottom:12px;
    border:1px solid var(--line);background:var(--surface-2);
    color:var(--ink);font-family:'Inter',sans-serif;font-size:15px;
    transition:border-color .15s;display:block;
  }
  .gate-select{cursor:pointer;}
  .gate-select:focus,.gate-input:focus{outline:none;border-color:var(--teal);}
  .gate-submit{
    width:100%;padding:13px;border-radius:12px;border:none;
    background:var(--teal);color:var(--check-mark);
    font-family:'Inter',sans-serif;font-size:15px;font-weight:700;
    cursor:pointer;transition:opacity .15s;
  }
  .gate-submit:hover{opacity:0.88;}
  .gate-submit:disabled{opacity:0.5;cursor:default;}
  .gate-error{color:var(--rose);font-size:12px;margin-top:12px;font-family:'IBM Plex Mono',monospace;min-height:18px;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-5px);}
    80%{transform:translateX(5px);}
  }
  .gate-input.shake{animation:shake .35s ease;}
  .app{display:none;}
  .app.visible{display:block;}

  /* ── Daily quote ── */
  .quote-card{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:18px 24px;margin:0 0 22px;box-shadow:var(--shadow);text-align:center;
  }
  .quote-arabic{font-family:'Lora',serif;font-size:19px;color:var(--gold);margin-bottom:10px;line-height:1.7;direction:rtl;unicode-bidi:bidi-override;}
  .quote-english{font-size:13px;color:var(--ink);font-style:italic;margin-bottom:6px;max-width:560px;margin-left:auto;margin-right:auto;}
  .quote-ref{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--teal);letter-spacing:.06em;text-transform:uppercase;}

  /* ── Switcher ── */
  .switcher{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:22px;}
  .switch-btn{
    display:flex;align-items:center;gap:8px;padding:8px 16px 8px 8px;border-radius:999px;
    border:1px solid var(--line);background:var(--surface);
    color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer;
    transition:border-color .15s,color .15s;
  }
  .switch-btn .gate-avatar{width:24px;height:24px;font-size:11px;}
  .switch-btn.active{border:1.5px dashed var(--gold);color:var(--ink);background:var(--teal-light);}
  .switch-btn .you-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;}
  .switcher-users,.switcher-modes{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .mode-btn{
    padding:8px 16px;border-radius:999px;border:1px solid var(--line);
    background:var(--surface);color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer;
    transition:border-color .15s,color .15s,background .15s;
  }
  .mode-btn.active{border-color:var(--teal);color:var(--ink);background:var(--teal-light);}

  /* ── Week nav ── */
  .weeknav{display:flex;align-items:center;justify-content:center;gap:14px;margin:0 0 18px;flex-wrap:wrap;}
  .navbtn{
    border:1px solid var(--line);background:var(--surface);color:var(--teal);
    width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s,box-shadow .15s;box-shadow:var(--shadow);
  }
  .navbtn:hover{transform:translateY(-1px);}
  .weekrange-wrap{
    display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:8px 16px;box-shadow:var(--shadow);
  }
  .weekrange{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink);white-space:nowrap;cursor:pointer;}
  #datePicker{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);
    border:none;border-left:1px solid var(--line);background:transparent;padding:0 0 0 8px;width:108px;cursor:pointer;
  }
  #datePicker:focus{outline:none;}
  .todaybtn{
    font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--teal);
    background:var(--teal-light);border:none;border-radius:999px;padding:8px 14px;cursor:pointer;
  }

  /* ── Medallions ── */
  .duo-medallions{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:0 auto 26px;}
  .person-panel{
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:14px 12px 10px;box-shadow:var(--shadow);transition:box-shadow .2s,border-color .2s;
  }
  .person-panel.userA{border-top:3px solid var(--teal);}
  .person-panel.userB{border-top:3px solid var(--rose);}
  .person-panel.active-panel{border:1.5px dashed var(--gold);border-top-width:3px;box-shadow:0 0 10px rgba(227,183,101,0.18),var(--shadow);}
  .you-badge{
    font-size:9px;font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;padding:2px 7px;border-radius:999px;margin-left:4px;
    background:var(--gold);color:var(--check-mark);vertical-align:middle;
  }
  .person-title{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:10px;font-family:'Lora',serif;font-weight:600;font-size:14px;}
  .medallions{display:flex;justify-content:space-between;gap:4px;}
  .medal{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .medal .dayname{font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .medal.today .dayname{color:var(--gold);}
  .ringwrap{position:relative;width:38px;height:38px;}
  .ringwrap svg{transform:rotate(-90deg);}
  .ringwrap .track{fill:none;stroke:var(--line);stroke-width:4;}
  .ringwrap .prog{fill:none;stroke-linecap:round;transition:stroke-dasharray .4s;}
  .ringwrap.userA .prog{stroke:url(#ringGradA);}
  .ringwrap.userB .prog{stroke:url(#ringGradB);}
  .ringwrap .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;color:var(--ink);}
  .medal.today .ringwrap::after{content:'';position:absolute;inset:-3px;border:1.5px dashed var(--gold);border-radius:50%;}

  /* ── Table ── */
  .tablecard{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;}
  .scrollx{overflow-x:auto;}
  table{border-collapse:collapse;width:100%;min-width:720px;}
  thead th{
    font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--ink-soft);font-weight:600;text-align:center;padding:14px 6px 10px;
    border-bottom:1px solid var(--line);background:var(--surface);
  }
  thead th.daycol.today{color:var(--gold);}
  thead th:first-child{text-align:left;padding-left:18px;position:sticky;left:0;z-index:2;background:var(--surface);}
  tbody tr{border-bottom:1px solid var(--line);}
  tbody tr:last-child{border-bottom:none;}
  tbody tr.section-start td{border-top:2px solid var(--line);}
  td{padding:10px 6px;text-align:center;vertical-align:middle;}
  td.activity{text-align:left;padding-left:18px;position:sticky;left:0;z-index:1;background:var(--surface);min-width:220px;}
  .act-row{display:flex;align-items:center;gap:10px;}
  .act-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 auto;}
  .act-icon.worship{background:var(--teal-light);}
  .act-icon.study{background:var(--sky-light);}
  .act-icon.friday{background:var(--gold-light);}
  .act-icon.other{background:var(--lavender-light);}
  .act-text{flex:1;min-width:0;}
  .act-text .act-label{font-size:13.5px;font-weight:600;line-height:1.25;}
  .act-text .act-time{font-size:11px;color:var(--ink-soft);}
  .act-time-badge{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;
    color:var(--gold);background:var(--gold-light);border-radius:999px;
    padding:3px 9px;letter-spacing:.04em;white-space:nowrap;flex-shrink:0;margin-top:3px;
  }
  .act-daily-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .act-daily-row .act-note{flex:1;margin-top:0;}
  .toggle-pair{display:flex;gap:6px;justify-content:center;align-items:center;}
  .toggle{
    width:30px;height:30px;border-radius:50%;border:2px dotted rgba(255,255,255,0.45);background:transparent;
    cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
    transition:background .15s,border-color .15s,transform .1s,box-shadow .15s;
    color:transparent;font-size:13px;box-shadow:0 0 0 3px rgba(255,255,255,0.04);
  }
  .toggle:hover:not(.disabled){border-color:rgba(255,255,255,0.45);box-shadow:0 0 0 4px rgba(255,255,255,0.08);}
  .toggle:active{transform:scale(0.88);}
  .toggle.worship.checked{background:var(--teal);border-color:var(--teal);color:var(--check-mark);box-shadow:0 0 0 3px rgba(82,191,152,0.25);}
  .toggle.study.checked{background:var(--sky);border-color:var(--sky);color:var(--check-mark);box-shadow:0 0 0 3px rgba(121,172,222,0.25);}
  .toggle.friday.checked{background:var(--gold);border-color:var(--gold);color:var(--check-mark);box-shadow:0 0 0 3px rgba(227,183,101,0.25);}
  .toggle.other.checked{background:var(--lavender);border-color:var(--lavender);color:var(--check-mark);box-shadow:0 0 0 3px rgba(167,139,250,0.25);}
  .toggle.disabled{border-color:var(--line);background:repeating-linear-gradient(45deg,var(--bg) 0 4px,var(--surface) 4px 8px);cursor:default;box-shadow:none;}
  .maghrib-note{font-size:9px;color:var(--ink-soft);display:block;margin-top:4px;font-family:'IBM Plex Mono',monospace;}

  /* ── Stats ── */
  .duo-stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px;}
  .statcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 8px;box-shadow:var(--shadow);text-align:center;}
  .statcard .big{font-family:'Lora',serif;font-size:24px;font-weight:600;color:var(--teal);}
  .statcard .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-top:4px;font-weight:600;}

  /* ── Misc ── */
  .loading{text-align:center;padding:40px;color:var(--ink-soft);font-size:13px;font-family:'IBM Plex Mono',monospace;}
  .errornote{text-align:center;padding:16px;color:var(--rose);font-size:12px;font-family:'IBM Plex Mono',monospace;background:var(--rose-light);border-radius:10px;margin-bottom:16px;}

  /* ── Edit Modal ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.hidden{display:none;}
  .edit-modal{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:24px;width:100%;max-width:540px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow);}
  .edit-modal h3{font-family:'Lora',serif;font-size:18px;margin:0 0 18px;color:var(--teal);}
  .edit-row{display:grid;grid-template-columns:42px 1fr 100px 80px 32px;gap:6px;align-items:center;margin-bottom:8px;}
  .edit-row input{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;color:var(--ink);font-family:'Inter',sans-serif;font-size:13px;padding:7px 10px;}
  .edit-row input:focus{outline:none;border-color:var(--teal);}
  .edit-icon-inp{text-align:center;font-size:18px;padding:4px!important;}
  .edit-cat-sel{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;color:var(--ink-soft);font-size:12px;padding:7px 4px;cursor:pointer;}
  .edit-del-btn{background:var(--rose-light);border:1px solid var(--rose);border-radius:8px;color:var(--rose);font-size:14px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
  .edit-add-btn{width:100%;padding:10px;border-radius:10px;border:1.5px dashed var(--teal);background:transparent;color:var(--teal);font-size:13px;font-weight:600;cursor:pointer;margin:8px 0 18px;}
  .edit-actions{display:flex;gap:10px;justify-content:flex-end;}
  .edit-save-btn{padding:10px 24px;border-radius:999px;border:none;background:var(--teal);color:var(--check-mark);font-size:13px;font-weight:700;cursor:pointer;}
  .edit-cancel-btn{padding:10px 24px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer;}
  .edit-open-btn{font-size:12px;padding:5px 12px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--ink-soft);cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;}
  .edit-open-btn:hover{border-color:var(--teal);color:var(--teal);}
  .edit-reset-btn{padding:10px 16px;border-radius:999px;border:1px solid var(--rose);background:transparent;color:var(--rose);font-size:12px;font-weight:600;cursor:pointer;font-family:'IBM Plex Mono',monospace;margin-right:auto;}
  .edit-reset-btn:hover{background:var(--rose-light);}
  .edit-col-headers{display:grid;grid-template-columns:42px 1fr 100px 80px 32px;gap:6px;font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;padding:0 2px;}
  .edit-activity-group{border:1px solid var(--line);border-radius:10px;padding:8px;margin-bottom:8px;background:rgba(255,255,255,0.02);}
  .edit-activity-group .edit-row{margin-bottom:0;}
  .edit-sched{display:flex;align-items:center;gap:6px;padding-top:8px;margin-top:6px;border-top:1px solid var(--line);flex-wrap:wrap;}
  .sched-label{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;font-family:'IBM Plex Mono',monospace;min-width:58px;}
  .sched-type-btn{padding:3px 10px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--ink-soft);font-size:11px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:border-color .15s,color .15s,background .15s;}
  .sched-type-btn.active{border-color:var(--teal);color:var(--teal);background:rgba(82,191,152,0.1);}
  .sched-days{display:flex;gap:4px;align-items:center;}
  .sched-day-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--line);background:transparent;color:var(--ink-soft);font-size:10px;cursor:pointer;font-family:'IBM Plex Mono',monospace;display:inline-flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s,background .15s;}
  .sched-day-btn.on{border-color:var(--teal);color:var(--teal);background:rgba(82,191,152,0.15);}
  .sched-month-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-soft);}
  .sched-month-inp{background:var(--surface-2);border:1px solid var(--line);border-radius:6px;color:var(--ink);width:44px;padding:3px 6px;font-size:12px;text-align:center;font-family:'IBM Plex Mono',monospace;}
  .sched-month-inp:focus{outline:none;border-color:var(--teal);}

  /* ── Photo of the Day ── */
  .photo-day{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:14px;box-shadow:var(--shadow);}
  .photo-day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
  .photo-day-label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;}
  .photo-eye-btn{padding:5px 14px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--ink-soft);font-size:12px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:border-color .15s,color .15s;}
  .photo-eye-btn:hover{border-color:var(--teal);color:var(--teal);}
  .photo-img-wrap{text-align:center;}
  .photo-day img{width:100%;max-height:420px;border-radius:12px;object-fit:contain;display:block;margin:0 auto 12px;border:1px solid var(--line);background:#000;}
  .photo-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:8px;}
  .photo-upload-btn{
    display:inline-block;padding:10px 24px;border-radius:999px;
    border:1.5px dashed var(--teal);background:transparent;color:var(--teal);
    font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;
    transition:background .15s;min-height:44px;line-height:1;
  }
  .photo-upload-btn:hover{background:rgba(82,191,152,0.09);}
  .photo-remove-btn{
    display:inline-block;padding:10px 20px;border-radius:999px;
    border:1.5px dashed var(--rose);background:transparent;color:var(--rose);
    font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;
    transition:background .15s;min-height:44px;line-height:1;
  }
  .photo-remove-btn:hover{background:rgba(217,140,140,0.09);}
  .photo-remove-btn:disabled{opacity:0.5;cursor:default;}
  .photo-empty{color:var(--ink-soft);font-size:13px;margin-bottom:12px;text-align:center;}
  .photo-status{font-size:11px;color:var(--ink-soft);margin-top:8px;font-family:'IBM Plex Mono',monospace;min-height:16px;text-align:center;}
  /* photo breakpoint folded into main mobile block below */

  /* ── Undo / Reset ── */
  .undo-btn{
    margin-top:10px;padding:8px 20px;border-radius:999px;
    border:1.5px solid var(--sky);background:var(--sky-light);
    color:var(--sky);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
    cursor:pointer;transition:background .15s;
  }
  .undo-btn:hover{background:rgba(121,172,222,0.28);}
  #undoHost{text-align:center;}

const LABEL_HISTORY = {};

function getLabel(actId, dateISO, fallback){
  const history = LABEL_HISTORY[actId];
  if(history){

  sessionStorage.removeItem('tracker:token');
  sessionStorage.removeItem('tracker:user');
  sessionToken = null;
  currentUser  = null;
  document.getElementById('app').classList.remove('visible');

async function apiLogin(user, password){
  const url  = `${API_URL}?action=login&user=${encodeURIComponent(user)}&password=${encodeURIComponent(password)}`;
  const res  = await fetch(url);
  if(!res.ok) throw new Error('Network error ' + res.status);
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || 'Login failed');
  return json;
}

async function apiGetWeekBoth(start, end){
  const url  = `${API_URL}?action=getWeekBoth&userA=${encodeURIComponent(USER_A_NAME)}&userB=${encodeURIComponent(USER_B_NAME)}&start=${start}&end=${end}&token=${sessionToken}`;
  const res  = await fetch(url);
  if(!res.ok) throw new Error('Network error ' + res.status);
  const json = await res.json();
  if(json.code === 401){ handleUnauthorized(); throw new Error('Session expired'); }
  if(!json.ok) throw new Error(json.error || 'Unknown API error');
  return json.data;
}

/* ═══════════════════════════════════════════════
   PHOTO — resize + chunked upload
   ═══════════════════════════════════════════════ */
function localGetPhotoUrl(user, iso){ try{ return localStorage.getItem(`photo:${user}:${iso}`) || null; }catch(e){ return null; } }
function localSetPhotoUrl(user, iso, url){
  try{
    if(url) localStorage.setItem(`photo:${user}:${iso}`, url);
    else localStorage.removeItem(`photo:${user}:${iso}`);
  }catch(e){}
}

function resizeImage(file, maxPx = 720){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = ev => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > maxPx || h > maxPx){
          if(w >= h){ h = Math.round(h * maxPx / w); w = maxPx; }
          else       { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.78).split(',')[1]);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadToDrive(user, date, base64, onProgress){
  const CHUNK   = 3500;  // safe URL length (~4.5 KB per request)
  const BATCH   = 8;     // parallel requests
  const chunks  = [];
  for(let i = 0; i < base64.length; i += CHUNK) chunks.push(base64.slice(i, i + CHUNK));
  const total   = chunks.length;
  const session = `${user.replace(/\W/g,'_')}_${date}_${Date.now()}`;
  let sent      = 0;
  let finalUrl  = null;

  async function sendChunk(idx){
    const url  = `${API_URL}?action=uploadChunk&session=${encodeURIComponent(session)}&index=${idx}&total=${total}&user=${encodeURIComponent(user)}&date=${date}&chunk=${encodeURIComponent(chunks[idx])}&token=${sessionToken}`;
    const res  = await fetch(url);
    if(!res.ok) throw new Error(`Server error ${res.status} on chunk ${idx}`);
    const json = await res.json();
    if(!json.ok) throw new Error(json.error || `Chunk ${idx} failed`);
    sent++; onProgress(sent, total);
    if(json.done) finalUrl = json.url;
  }

  // All chunks except last — parallel batches
  for(let i = 0; i < total - 1; i += BATCH){
    const batch = Array.from({ length: Math.min(BATCH, total - 1 - i) }, (_, j) => i + j);
    await Promise.all(batch.map(sendChunk));
  }
  // Last chunk alone — triggers Drive assembly on server
  await sendChunk(total - 1);

  if(!finalUrl) throw new Error('Upload complete but no URL returned');
  return finalUrl;
}

async function renderPhotoDay(){
  const host = document.getElementById('photoDayHost');
  if(viewMode !== 'daily'){ host.innerHTML = ''; return; }
  const iso = formatISO(selectedDate);

  let photoUrl = localGetPhotoUrl(currentUser, iso);

  const eyeBtn = photoUrl
    ? `<button class="photo-eye-btn" id="photoEyeBtn">${photoVisible ? '👁 Hide' : '👁 Show'}</button>`
    : '';

  host.innerHTML = `<div class="photo-day">
    <div class="photo-day-header">
      <span class="photo-day-label">📸 Photo of the Day</span>
      ${eyeBtn}
    </div>
    <div id="photoContent">${photoUrl ? buildPhotoContent(photoUrl, iso) : '<div class="photo-status">Loading…</div>'}</div>
  </div>`;

  wireEyeBtn();
  wireUploadInput(iso);
  wireRemoveBtn(iso);

  // Fetch from server in background
  if(configured()){
    const serverUrl = await apiGetPhoto(currentUser, iso);
    if(serverUrl && serverUrl !== photoUrl){
      photoUrl = serverUrl;
      localSetPhotoUrl(currentUser, iso, serverUrl);
      const content = document.getElementById('photoContent');
      if(content){ content.innerHTML = buildPhotoContent(serverUrl, iso); wireUploadInput(iso); wireRemoveBtn(iso); }
      const header = document.querySelector('.photo-day-header');
      if(header && !header.querySelector('.photo-eye-btn')){
        header.insertAdjacentHTML('beforeend', `<button class="photo-eye-btn" id="photoEyeBtn">${photoVisible?'👁 Hide':'👁 Show'}</button>`);
        wireEyeBtn();
      }
    } else if(!photoUrl){
      const content = document.getElementById('photoContent');
      if(content){ content.innerHTML = buildPhotoContent(null, iso); wireUploadInput(iso); wireRemoveBtn(iso); }
    }
  } else if(!photoUrl){
    const content = document.getElementById('photoContent');
    if(content){ content.innerHTML = buildPhotoContent(null, iso); wireUploadInput(iso); wireRemoveBtn(iso); }
  }
}

function wireRemoveBtn(iso){
  const btn = document.getElementById('photoRemoveBtn');
  if(!btn) return;
  btn.addEventListener('click', async () => {
    if(!confirm('Remove today\'s photo?')) return;
    btn.disabled = true;
    btn.textContent = 'Removing…';
    if(configured()) await apiDeletePhoto(currentUser, iso);
    localSetPhotoUrl(currentUser, iso, null);
    photoVisible = true;
    renderPhotoDay();
  });
}

function wireEyeBtn(){
  const btn = document.getElementById('photoEyeBtn');
  if(!btn) return;
  btn.addEventListener('click', () => {
    photoVisible = !photoVisible;
    btn.textContent = photoVisible ? '👁 Hide' : '👁 Show';
    const wrap = document.getElementById('photoImgWrap');
    if(wrap) wrap.style.display = photoVisible ? 'block' : 'none';
  });
}

function wireUploadInput(iso){
  const input = document.getElementById('photoInput');
  if(!input) return;
  input.addEventListener('change', async ev => {
    const file = ev.target.files[0];
    if(!file) return;
    const status = document.getElementById('photoStatus');
    const label  = input.closest('label');
    if(label) label.style.pointerEvents = 'none';
    status.textContent = 'Resizing image…';
    try{
      const base64 = await resizeImage(file);
      const imgUrl = await uploadToDrive(currentUser, iso, base64, (done, total) => {
        status.textContent = `Uploading… ${done}/${total} chunks`;
      });
      localSetPhotoUrl(currentUser, iso, imgUrl);
      status.textContent = '✓ Saved to Google Drive';
      setTimeout(() => { photoVisible = true; renderPhotoDay(); }, 800);
    }catch(err){
      status.textContent = '⚠ ' + err.message;
      if(label) label.style.pointerEvents = '';
    }
  });
}

/* ═══════════════════════════════════════════════
   DATE HELPERS
   ═══════════════════════════════════════════════ */
function formatISO(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function startOfWeek(date){
  const d = new Date(date), day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  d.setHours(0,0,0,0);
  return d;
}
function weeksBetween(targetDate){
  const a = startOfWeek(targetDate), b = startOfWeek(new Date());
  return Math.round((a - b) / 604800000);
}
function getWeekDates(){
  const base = startOfWeek(new Date());
  base.setDate(base.getDate() + weekOffset * 7);
  return Array.from({length:7}, (_, i) => { const d = new Date(base); d.setDate(base.getDate() + i); return d; });
}
function dayIdx(d){ return (d.getDay() + 6) % 7; } // Mon=0 … Sun=6
function applicableCount(dIdx, user, date){
  return getActivities(user).filter(a => actApplies(a, date || new Date())).length;
}
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function doLogin(){
  const userEl = document.getElementById('loginUser');
  const passEl = document.getElementById('loginPassword');
  const errEl  = document.getElementById('loginError');
  const btn    = document.getElementById('loginBtn');
  const user   = userEl.value, pass = passEl.value;

  if(!user){ errEl.textContent = 'Please select your name'; return; }
  if(!pass){ errEl.textContent = 'Please enter your password'; return; }

  btn.disabled = true; btn.textContent = 'Signing in…'; errEl.textContent = '';
  try{
    const result = await apiLogin(user, pass);
    sessionToken = result.token;
    sessionStorage.setItem('tracker:token', result.token);
    sessionStorage.setItem('tracker:user',  result.user);
    document.getElementById('loginGate').style.display = 'none';
    selectUser(result.user);

    errEl.textContent = err.message || 'Login failed';
    passEl.value = ''; passEl.classList.remove('shake');
    void passEl.offsetWidth; passEl.classList.add('shake'); passEl.focus();
  }finally{
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

function getCurrentEditedActivities(){
  const defaults   = getActivities(currentUser);
  const defsById   = Object.fromEntries(defaults.map(a => [a.id, a]));

    const inputs = row.querySelectorAll('input');

    const id     = rowId || `${currentUser.toLowerCase()}_custom_${Date.now()}_${idx}`;

    const schedDiv  = document.querySelector(`.edit-sched[data-idx="${idx}"]`);
    const activeBtn = schedDiv?.querySelector('.sched-type-btn.active');
    const sType     = activeBtn?.dataset.type || 'daily';

      scheduleDays = Array.from(schedDiv.querySelectorAll('.sched-day-btn.on')).map(b => parseInt(b.dataset.d));

    return {
      id,
      icon:     inputs[0].value || '⭐',
      label:    inputs[1].value || 'Activity',
      time:     inputs[2].value || '',
      cat:      sel.value,
      section:  def ? def.section : false,
      fridayOnly, monthDay1Only,
      ...(scheduleDays !== null ? { scheduleDays } : {}),
      ...(monthDay     !== null ? { monthDay }     : {}),
    };
  });
}

function setSyncBadge(kind, text){
  document.getElementById('syncBadge').innerHTML = `<span class="dot ${kind}"></span> ${text}`;
}

async function loadWeek(){
  document.getElementById('tableHost').innerHTML = '<div class="loading">Loading…</div>';
  document.getElementById('tableHost').className = 'loading';
  document.getElementById('errorHost').innerHTML  = '';

  const dates = getWeekDates();
  const start = formatISO(dates[0]), end = formatISO(dates[6]);

  weekDataA = {}; weekDataB = {};
  dates.forEach(d => { weekDataA[formatISO(d)] = new Set(); weekDataB[formatISO(d)] = new Set(); });

  if(configured()){
    const cacheKey = `${start}:${end}`;
    const hit      = apiCache[cacheKey];
    let data       = null;

    if(hit && (Date.now() - hit.time) < 60000){
      data = hit.data; usingCloud = true;
      setSyncBadge('cloud', `Synced — ${USER_A_NAME} &amp; ${USER_B_NAME}`);
    } else {
      try{
        data = await apiGetWeekBoth(start, end);
        apiCache[cacheKey] = { data, time: Date.now() };
        usingCloud = true;
        setSyncBadge('cloud', `Synced — ${USER_A_NAME} &amp; ${USER_B_NAME}`);
      }catch(err){
        usingCloud = false;
        setSyncBadge('err', 'Could not reach sheet — showing local data');
        dates.forEach(d => {
          const iso = formatISO(d);
          weekDataA[iso] = new Set(localGet(USER_A_NAME, iso));
          weekDataB[iso] = new Set(localGet(USER_B_NAME, iso));
        });
        render(); return;
      }
    }

    if(data){
      dates.forEach(d => {
        const iso = formatISO(d);
        weekDataA[iso] = new Set((data[USER_A_NAME]?.[iso]) || []);
        weekDataB[iso] = new Set((data[USER_B_NAME]?.[iso]) || []);
        localSet(USER_A_NAME, iso, [...weekDataA[iso]]);
        localSet(USER_B_NAME, iso, [...weekDataB[iso]]);
      });
    }
  } else {
    usingCloud = false;
    setSyncBadge('local', 'Backend not connected — saving locally only');
    dates.forEach(d => {
      const iso = formatISO(d);
      weekDataA[iso] = new Set(localGet(USER_A_NAME, iso));
      weekDataB[iso] = new Set(localGet(USER_B_NAME, iso));
    });
  }

  render();
}

async function toggleActivity(iso, activityId, dIdx, who){
  const act = getActivities(who).find(a => a.id === activityId);
  const _tDate = new Date(iso + 'T00:00:00');
  if(!act || !actApplies(act, _tDate)) return;
  if(who !== currentUser) return;

  const set = who === USER_A_NAME ? weekDataA[iso] : weekDataB[iso];
  if(!set) return;

  const wasChecked = set.has(activityId);
  lastAction = { who, iso, activityId, wasChecked };
  if(wasChecked) set.delete(activityId); else set.add(activityId);

  renderLight();
  renderUndoBtn();
  localSet(who, iso, [...set]);

  if(usingCloud){
    setSyncBadge('local', 'Saving…');
    try{
      await apiSaveDay(who, iso, [...set]);
      Object.keys(apiCache).forEach(k => delete apiCache[k]);
      setSyncBadge('cloud', `Saved ✓ — ${USER_A_NAME} &amp; ${USER_B_NAME}`);
      setTimeout(() => setSyncBadge('cloud', `Synced — ${USER_A_NAME} &amp; ${USER_B_NAME}`), 2000);
    }catch(err){
      setSyncBadge('err', 'Save failed: ' + err.message);
      usingCloud = false;
    }
  }
}

/* ═══════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════ */
function getDisplayDates(){
  return viewMode === 'daily' ? [new Date(selectedDate)] : getWeekDates();
}

function render(){
  const dates    = getDisplayDates();
  const rangeStr = viewMode === 'daily'
    ? `${DAY_NAMES[dayIdx(dates[0])]} ${MONTH_NAMES[dates[0].getMonth()]} ${dates[0].getDate()}, ${dates[0].getFullYear()}`
    : (() => {
        const first = dates[0], last = dates[6];
        return first.getMonth() === last.getMonth()
          ? `${MONTH_NAMES[first.getMonth()]} ${first.getDate()}–${last.getDate()}, ${last.getFullYear()}`
          : `${MONTH_NAMES[first.getMonth()]} ${first.getDate()} – ${MONTH_NAMES[last.getMonth()]} ${last.getDate()}, ${last.getFullYear()}`;
      })();

  document.getElementById('weekRange').textContent  = rangeStr;
  document.getElementById('datePicker').value = formatISO(selectedDate);

  // Build table
  let thead = '<thead><tr><th>Activity</th>';
  dates.forEach(d => {
    const iso    = formatISO(d);
    const isToday = iso === todayISO;
    const di     = dayIdx(d);
    thead += `<th class="daycol${isToday?' today':''}">${DAY_NAMES[di]}<br><span style="font-weight:400">${d.getDate()}</span></th>`;
  });
  thead += '</tr></thead>';

  const labelDate = formatISO(dates[0]);
  let tbody = '<tbody>';
  getActivities(currentUser).forEach(act => {
    const label = getLabel(act.id, labelDate, act.label);
    tbody += `<tr class="${act.section?'section-start':''}" data-act="${act.id}">`;

    let actCell = '';
    if(viewMode === 'daily'){
      const iso  = formatISO(dates[0]);
      const note = localGetNote(currentUser, iso, act.id);
      const noteTA = `<textarea class="act-note" data-iso="${iso}" data-actid="${act.id}" placeholder="📝 Add a note…">${escapeHtml(note)}</textarea>`;
      actCell = `<td class="activity"><div class="act-row"><div class="act-icon ${catCSSClass(act.cat)}">${act.icon}</div><div class="act-text"><div class="act-label">${label}</div><div class="act-daily-row"><span class="act-time-badge">${act.time}</span>${noteTA}</div></div></div></td>`;
    } else {
      let noteDot = '';
      if(dates.some(d => localGetNote(currentUser, formatISO(d), act.id)))
        noteDot = `<span class="note-dot" title="Notes added this week">💬</span>`;
      actCell = `<td class="activity"><div class="act-row"><div class="act-icon ${catCSSClass(act.cat)}">${act.icon}</div><div class="act-text"><div class="act-label">${label}</div><div class="act-time">${act.time}</div>${noteDot}</div></div></td>`;
    }
    tbody += actCell;

    dates.forEach(d => {
      const iso      = formatISO(d);
      const di       = dayIdx(d);
      const disabled = !actApplies(act, d);
      let cell = '';
      if(disabled){
        cell = `<div class="toggle-pair"><button class="toggle disabled" disabled></button></div>`;
      } else {
        const checked = (currentUser === USER_A_NAME ? weekDataA : weekDataB)[iso]?.has(act.id);
        cell = `<div class="toggle-pair"><button class="toggle ${catCSSClass(act.cat)}${checked?' checked':''}" data-iso="${iso}" data-id="${act.id}" data-day="${di}" data-who="${currentUser}">${checked?'✓':''}</button></div>`;
      }
      if(act.id === 'ibrahim_maghrib') cell += `<span class="maghrib-note">${MAGHRIB_NOTE}</span>`;
      tbody += `<td>${cell}</td>`;
    });
    tbody += '</tr>';
  });
  tbody += '</tbody>';

  const host = document.getElementById('tableHost');
  host.className = viewMode === 'daily' ? 'daily' : '';
  host.innerHTML = `<table>${thead}${tbody}</table>`;

  host.querySelectorAll('.toggle:not(.disabled)').forEach(btn =>
    btn.addEventListener('click', () =>
      toggleActivity(btn.dataset.iso, btn.dataset.id, Number(btn.dataset.day), btn.dataset.who)
    )
  );
  host.querySelectorAll('.act-note').forEach(ta =>
    ta.addEventListener('input', () => {
      clearTimeout(_noteSaveTimer);
      _noteSaveTimer = setTimeout(() => localSetNote(currentUser, ta.dataset.iso, ta.dataset.actid, ta.value.trim()), 400);
    })
  );

  renderDuoMedallions();
  renderDuoStats();
  renderQuote();
  renderResetBtn();
  renderPhotoDay();
}

function renderLight(){
  document.querySelectorAll('#tableHost .toggle:not(.disabled)').forEach(btn => {
    const set     = (btn.dataset.who === USER_A_NAME ? weekDataA : weekDataB)[btn.dataset.iso];
    const checked = set?.has(btn.dataset.id);
    btn.classList.toggle('checked', !!checked);
    btn.textContent = checked ? '✓' : '';
  });
  renderDuoMedallions();
  renderDuoStats();
}

function renderDuoMedallions(){
  const dates = getWeekDates();
  const circ  = 2 * Math.PI * 16;

  function panelHTML(name, dataMap, cls){
    const isActive = name === currentUser;
    const inner    = dates.map((d, i) => {
      const iso  = formatISO(d);
      const set  = dataMap[iso] || new Set();
      const pct  = applicableCount(i, name, d) ? Math.round(set.size / applicableCount(i, name, d) * 100) : 0;
      const dash = (pct / 100) * circ;
      return `<div class="medal${iso===todayISO?' today':''}">
        <div class="dayname">${DAY_NAMES[i]}</div>
        <div class="ringwrap ${cls}">
          <svg viewBox="0 0 36 36" width="38" height="38">
            <circle class="track" cx="18" cy="18" r="16"/>
            <circle class="prog" cx="18" cy="18" r="16" stroke-dasharray="${dash} ${circ}"/>
          </svg>
          <div class="pct">${pct}%</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="person-panel ${cls}${isActive?' active-panel':''}">
      <div class="person-title"><span class="gate-avatar ${cls}">${name[0].toUpperCase()}</span>${name}${isActive?'<span class="you-badge">You</span>':''}</div>
      <div class="medallions">${inner}</div>
    </div>`;
  }

  document.getElementById('duoMedallions').innerHTML =
    panelHTML(USER_A_NAME, weekDataA, 'userA') +
    panelHTML(USER_B_NAME, weekDataB, 'userB');
}

function renderDuoStats(){
  function statsFor(dataMap, user){
    const dates = getWeekDates();
    let total=0, done=0;
    dates.forEach((d, i) =>
      getActivities(user).forEach(act => {
        if(!actApplies(act, d)) return;
        total++;
        if((dataMap[formatISO(d)] || new Set()).has(act.id)) done++;
      })
    );
    return total ? Math.round(done / total * 100) : 0;
  }
  const pctA = statsFor(weekDataA, USER_A_NAME);
  const pctB = statsFor(weekDataB, USER_B_NAME);
  document.getElementById('duoStats').innerHTML = `
    <div class="statcard">
      <div class="person-title" style="justify-content:center;margin-bottom:10px;font-size:13px;">
        <span class="gate-avatar userA" style="width:26px;height:26px;font-size:12px;">${USER_A_NAME[0]}</span>${USER_A_NAME}
      </div>
      <div class="big">${pctA}%</div><div class="lbl">This week</div>
    </div>
    <div class="statcard">
      <div class="person-title" style="justify-content:center;margin-bottom:10px;font-size:13px;">
        <span class="gate-avatar userB" style="width:26px;height:26px;font-size:12px;">${USER_B_NAME[0]}</span>${USER_B_NAME}
      </div>
      <div class="big" style="color:var(--rose);">${pctB}%</div><div class="lbl">This week</div>
    </div>`;
}

function renderQuote(){
  const d = selectedDate;
  const n = Math.floor((d - new Date(d.getFullYear(),0,0)) / 86400000);
  const q = DAILY_QUOTES[n % DAILY_QUOTES.length];
  document.getElementById('quoteCard').innerHTML =
    `<div class="quote-arabic">${q.arabic}</div>` +
    `<div class="quote-english">"${q.english}"</div>` +
    `<div class="quote-ref">${q.ref}</div>`;
}

function renderUndoBtn(){
  const host = document.getElementById('undoHost');
  if(!lastAction){ host.innerHTML = ''; return; }
  host.innerHTML = `<button class="undo-btn" id="undoBtn">↩ Undo last toggle</button>`;
  document.getElementById('undoBtn').addEventListener('click', () => {
    const { who, iso, activityId, wasChecked } = lastAction;
    const set = who === USER_A_NAME ? weekDataA[iso] : weekDataB[iso];
    if(wasChecked) set.add(activityId); else set.delete(activityId);
    localSet(who, iso, [...set]);
    if(usingCloud) apiSaveDay(who, iso, [...set]).catch(() => {});
    lastAction = null;
    renderLight();
    renderUndoBtn();
  });
}

function renderResetBtn(){
  const host = document.getElementById('resetHost');
  if(viewMode !== 'daily'){ host.innerHTML = ''; return; }
  const iso = formatISO(selectedDate);
  host.innerHTML = `<button class="reset-day-btn" id="resetDayBtn">Reset this day</button>`;
  document.getElementById('resetDayBtn').addEventListener('click', () => {
    const set = currentUser === USER_A_NAME ? weekDataA[iso] : weekDataB[iso];
    set.clear();
    localSet(currentUser, iso, []);
    Object.keys(apiCache).forEach(k => delete apiCache[k]);
    if(usingCloud) apiSaveDay(currentUser, iso, []).catch(() => {});
    renderLight();
    renderResetBtn();
  });
}

/* ═══════════════════════════════════════════════
   NAV EVENTS
   ═══════════════════════════════════════════════ */
document.getElementById('prevBtn').addEventListener('click', () => {
  if(viewMode === 'daily'){
    selectedDate.setDate(selectedDate.getDate() - 1);
    const newOffset = weeksBetween(selectedDate);
    if(newOffset === weekOffset){ render(); return; }
    weekOffset = newOffset;
  } else {
    weekOffset--; selectedDate.setDate(selectedDate.getDate() - 7);
  }
  loadWeek();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if(viewMode === 'daily'){
    selectedDate.setDate(selectedDate.getDate() + 1);
    const newOffset = weeksBetween(selectedDate);
    if(newOffset === weekOffset){ render(); return; }
    weekOffset = newOffset;
  } else {
    weekOffset++; selectedDate.setDate(selectedDate.getDate() + 7);
  }
  loadWeek();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  if(viewMode === 'daily'){
    selectedDate = new Date();
    const newOffset = weeksBetween(selectedDate);
    if(newOffset === weekOffset){ render(); return; }
    weekOffset = newOffset;
  } else {
    weekOffset = 0; selectedDate = new Date();
  }
  loadWeek();
});
document.getElementById('datePicker').addEventListener('change', e => {
  if(!e.target.value) return;
  const [y,m,d] = e.target.value.split('-').map(Number);
  selectedDate   = new Date(y, m-1, d);
  weekOffset     = weeksBetween(selectedDate);
  loadWeek();
});

/* ═══════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════ */
;(function(){
  const tok  = sessionStorage.getItem('tracker:token');
  const user = sessionStorage.getItem('tracker:user');
  if(tok && user && configured()){
    sessionToken = tok;
    selectUser(user);
  } else {
    showLoginGate();
    if(!configured()) setSyncBadge('local', 'Backend not connected — paste your Apps Script URL');
  }
})();
</script>
