<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#12171A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Tracker">
<title>Daily Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12171A;
    --surface:#1B2226;
    --surface-2:#212A2F;
    --ink:#EDE7DA;
    --ink-soft:#8E9894;
    --teal:#52BF98;
    --teal-light:rgba(82,191,152,0.14);
    --gold:#E3B765;
    --gold-light:rgba(227,183,101,0.16);
    --sky:#79ACDE;
    --sky-light:rgba(121,172,222,0.14);
    --rose:#D98C8C;
    --rose-light:rgba(217,140,140,0.16);
    --line:#2D363A;
    --shadow: 0 1px 2px rgba(0,0,0,0.35), 0 6px 20px rgba(0,0,0,0.4);
    --check-mark:#12171A;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.035) 1px, transparent 0);
    background-size: 22px 22px;
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding: 28px 16px 60px;
  }
  .wrap{max-width:1080px;margin:0 auto;}

  /* ---------- Header ---------- */
  header.top{text-align:center;margin-bottom: 24px;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--gold);font-weight:600;
  }
  h1{
    font-family:'Lora',serif;font-weight:600;font-size: clamp(28px, 5vw, 40px);
    margin: 6px 0 6px;color:var(--teal);
  }
  .sub{color:var(--ink-soft);font-size:14px;max-width:540px;margin:0 auto;}
  .syncbadge{
    display:inline-flex;align-items:center;gap:6px;margin-top:12px;
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);
    background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px 12px;
  }
  .syncbadge .dot{width:8px;height:8px;border-radius:50%;}
  .syncbadge .dot.cloud{background:var(--teal);}
  .syncbadge .dot.local{background:var(--gold);}
  .syncbadge .dot.err{background:var(--rose);}

  /* ---------- Name gate ---------- */
  .gate{
    max-width:420px;margin:60px auto;text-align:center;
    background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:36px 28px;box-shadow:var(--shadow);
  }
  .gate h2{font-family:'Lora',serif;font-size:22px;color:var(--ink);margin:0 0 6px;}
  .gate p{color:var(--ink-soft);font-size:13px;margin:0 0 22px;}
  .gate-btn{
    display:block;width:100%;padding:14px 18px;margin-bottom:10px;
    background:var(--surface-2);border:1px solid var(--line);border-radius:12px;
    color:var(--ink);font-family:'Inter',sans-serif;font-size:15px;font-weight:600;
    cursor:pointer;transition:transform .12s ease, border-color .12s ease;
    display:flex;align-items:center;gap:12px;
  }
  .gate-btn:hover{transform:translateY(-1px);border-color:var(--teal);}
  .gate-avatar{
    width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Lora',serif;font-weight:600;font-size:15px;color:var(--check-mark);flex:0 0 auto;
  }
  .gate-avatar.userA{background:var(--teal);}
  .gate-avatar.userB{background:var(--rose);}
  .gate-foot{margin-top:18px;font-size:11px;color:var(--ink-soft);}
  .gate-foot button{
    background:none;border:none;color:var(--gold);text-decoration:underline;cursor:pointer;
    font-family:inherit;font-size:11px;padding:0;
  }
  .app{display:none;}
  .app.visible{display:block;}

  /* ---------- Daily quote ---------- */
  .quote-card{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:18px 24px;margin:0 0 22px;box-shadow:var(--shadow);text-align:center;
  }
  .quote-arabic{
    font-family:'Lora',serif;font-size:19px;color:var(--gold);margin-bottom:10px;
    line-height:1.7;direction:rtl;unicode-bidi:bidi-override;
  }
  .quote-english{font-size:13px;color:var(--ink);font-style:italic;margin-bottom:6px;max-width:560px;margin-left:auto;margin-right:auto;}
  .quote-ref{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--teal);letter-spacing:.06em;text-transform:uppercase;}

  /* ---------- Switcher ---------- */
  .switcher{
    display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:22px;
  }
  .switch-btn{
    display:flex;align-items:center;gap:8px;
    padding:8px 16px 8px 8px;border-radius:999px;
    border:1px solid var(--line);background:var(--surface);
    color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer;
    transition: border-color .15s ease, color .15s ease;
  }
  .switch-btn .gate-avatar{width:24px;height:24px;font-size:11px;}
  .switch-btn.active{border:1.5px dashed var(--gold);color:var(--ink);background:var(--teal-light);}
  .switch-btn.active .gate-avatar.userB{box-shadow:0 0 0 1px var(--rose) inset;}
  .switch-btn .you-tag{
    font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--gold);
    text-transform:uppercase;letter-spacing:.05em;
  }
  .switcher-users, .switcher-modes{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .mode-btn{
    padding:8px 16px;border-radius:999px;border:1px solid var(--line);
    background:var(--surface);color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer;
    transition:border-color .15s ease, color .15s ease, background .15s ease;
  }
  .mode-btn.active{
    border-color:var(--teal);color:var(--ink);background:var(--teal-light);
  }
  .switch-divider{width:1px;background:var(--line);margin:4px 2px;}

  /* ---------- Week nav ---------- */
  .weeknav{display:flex;align-items:center;justify-content:center;gap:14px;margin: 0 0 18px;flex-wrap:wrap;}
  .navbtn{
    border:1px solid var(--line);background:var(--surface);color:var(--teal);
    width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition: transform .15s ease, box-shadow .15s ease;box-shadow: var(--shadow);
  }
  .navbtn:hover{transform:translateY(-1px);}
  .weekrange-wrap{
    display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:8px 16px;box-shadow:var(--shadow);
  }
  .weekrange{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink);white-space:nowrap;cursor:pointer;}
  #datePicker{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);
    border:none;border-left:1px solid var(--line);background:transparent;padding:0 0 0 8px;
    width:108px;cursor:pointer;
  }
  #datePicker:focus{outline:none;}
  .todaybtn{
    font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--teal);
    background:var(--teal-light);border:none;border-radius:999px;padding:8px 14px;cursor:pointer;
  }

  /* ---------- Side-by-side medallions ---------- */
  .duo-medallions{
    display:grid;grid-template-columns:1fr 1fr;gap:14px;
    margin: 0 auto 26px;
  }
  .person-panel{
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:14px 12px 10px;box-shadow:var(--shadow);
    transition:box-shadow .2s ease, border-color .2s ease;
  }
  .person-panel.userA{border-top:3px solid var(--teal);}
  .person-panel.userB{border-top:3px solid var(--rose);}
  .person-panel.active-panel.userA,
  .person-panel.active-panel.userB{
    border:1.5px dashed var(--gold);
    border-top-width:3px;
    box-shadow:0 0 10px rgba(227,183,101,0.18), var(--shadow);
  }
  .you-badge{
    font-size:9px;font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;padding:2px 7px;border-radius:999px;margin-left:4px;
    background:var(--gold);color:var(--check-mark);vertical-align:middle;
  }
  .person-title{
    display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:10px;
    font-family:'Lora',serif;font-weight:600;font-size:14px;
  }
  .medallions{display:flex;justify-content:space-between;gap:4px;}
  .medal{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .medal .dayname{font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .medal.today .dayname{color:var(--gold);}
  .ringwrap{position:relative;width:38px;height:38px;}
  .ringwrap svg{transform:rotate(-90deg);}
  .ringwrap .track{fill:none;stroke:var(--line);stroke-width:4;}
  .ringwrap .prog{fill:none;stroke-linecap:round;transition:stroke-dasharray .4s ease;}
  .ringwrap.userA .prog{stroke:url(#ringGradA);}
  .ringwrap.userB .prog{stroke:url(#ringGradB);}
  .ringwrap .pct{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;color:var(--ink);
  }
  .medal.today .ringwrap::after{content:'';position:absolute;inset:-3px;border:1.5px dashed var(--gold);border-radius:50%;}

  /* ---------- Table ---------- */
  .tablecard{
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    box-shadow: var(--shadow);overflow:hidden;
  }
  .scrollx{overflow-x:auto;}
  table{border-collapse:collapse;width:100%;min-width:720px;}
  thead th{
    font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--ink-soft);font-weight:600;text-align:center;padding:14px 6px 10px;
    border-bottom:1px solid var(--line);background:var(--surface);
  }
  thead th.daycol.today{color:var(--gold);}
  thead th:first-child{
    text-align:left;padding-left:18px;position:sticky;left:0;z-index:2;background:var(--surface);
  }
  tbody tr{border-bottom:1px solid var(--line);}
  tbody tr:last-child{border-bottom:none;}
  tbody tr.section-start td{border-top:2px solid var(--line);}
  td{padding:10px 6px;text-align:center;vertical-align:middle;}
  td.activity{
    text-align:left;padding-left:18px;position:sticky;left:0;z-index:1;
    background:var(--surface);min-width:220px;
  }
  .act-row{display:flex;align-items:center;gap:10px;}
  .act-icon{
    width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-size:15px;flex:0 0 auto;
  }
  .act-icon.worship{background:var(--teal-light);}
  .act-icon.study{background:var(--sky-light);}
  .act-icon.friday{background:var(--gold-light);}
  .act-text .act-label{font-size:13.5px;font-weight:600;line-height:1.25;}
  .act-text .act-time{font-size:11px;color:var(--ink-soft);}

  .toggle-pair{display:flex;gap:6px;justify-content:center;align-items:center;}
  .toggle{
    width:28px;height:28px;border-radius:50%;border:1.5px solid var(--line);background:transparent;
    cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
    transition: background .15s ease, border-color .15s ease, transform .1s ease;
    color:transparent;font-size:13px;position:relative;
  }
  .toggle:active{transform:scale(0.9);}
  .toggle.worship.checked{background:var(--teal);border-color:var(--teal);color:var(--check-mark);}
  .toggle.study.checked{background:var(--sky);border-color:var(--sky);color:var(--check-mark);}
  .toggle.friday.checked{background:var(--gold);border-color:var(--gold);color:var(--check-mark);}
  .toggle.disabled{border-color:var(--line);background:repeating-linear-gradient(45deg, var(--bg) 0 4px, var(--surface) 4px 8px);cursor:default;}
  .toggle.readonly{cursor:default;opacity:0.55;}

  .maghrib-note{font-size:9px;color:var(--ink-soft);display:block;margin-top:4px;font-family:'IBM Plex Mono',monospace;}

  /* ---------- Stats ---------- */
  .duo-stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px;}
  .stats{display:grid;grid-template-columns: repeat(3, 1fr);gap:10px;}
  .statcard{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:14px 8px;box-shadow: var(--shadow);text-align:center;
  }
  .statcard .big{font-family:'Lora',serif;font-size:24px;font-weight:600;color:var(--teal);}
  .statcard.gold .big{color:var(--gold);}
  .statcard .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-top:4px;font-weight:600;}

  /* ---------- Legend ---------- */
  .legend{display:flex;justify-content:center;gap:22px;flex-wrap:wrap;margin-top:22px;font-size:12px;color:var(--ink-soft);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .dot.worship{background:var(--teal);}
  .dot.study{background:var(--sky);}
  .dot.friday{background:var(--gold);}
  .dot.self-legend{background:transparent;border:1.5px solid var(--gold);}

  .loading{text-align:center;padding:40px;color:var(--ink-soft);font-size:13px;font-family:'IBM Plex Mono',monospace;}
  .errornote{
    text-align:center;padding:16px;color:var(--rose);font-size:12px;
    font-family:'IBM Plex Mono',monospace;background:var(--rose-light);border-radius:10px;margin-bottom:16px;
  }

  /* ---------- Edit Modal ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:16px;
  }
  .modal-overlay.hidden{display:none;}
  .edit-modal{
    background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:24px;width:100%;max-width:540px;max-height:85vh;overflow-y:auto;
    box-shadow:var(--shadow);
  }
  .edit-modal h3{font-family:'Lora',serif;font-size:18px;margin:0 0 18px;color:var(--teal);}
  .edit-row{
    display:grid;grid-template-columns:42px 1fr 100px 80px 32px;
    gap:6px;align-items:center;margin-bottom:8px;
  }
  .edit-row input{
    background:var(--surface-2);border:1px solid var(--line);border-radius:8px;
    color:var(--ink);font-family:'Inter',sans-serif;font-size:13px;padding:7px 10px;
  }
  .edit-row input:focus{outline:none;border-color:var(--teal);}
  .edit-icon-inp{text-align:center;font-size:18px;padding:4px!important;}
  .edit-cat-sel{
    background:var(--surface-2);border:1px solid var(--line);border-radius:8px;
    color:var(--ink-soft);font-size:12px;padding:7px 4px;cursor:pointer;
  }
  .edit-del-btn{
    background:var(--rose-light);border:1px solid var(--rose);border-radius:8px;
    color:var(--rose);font-size:14px;cursor:pointer;width:32px;height:32px;
    display:flex;align-items:center;justify-content:center;
  }
  .edit-add-btn{
    width:100%;padding:10px;border-radius:10px;border:1.5px dashed var(--teal);
    background:transparent;color:var(--teal);font-size:13px;font-weight:600;
    cursor:pointer;margin:8px 0 18px;
  }
  .edit-actions{display:flex;gap:10px;justify-content:flex-end;}
  .edit-save-btn{
    padding:10px 24px;border-radius:999px;border:none;
    background:var(--teal);color:var(--check-mark);font-size:13px;font-weight:700;cursor:pointer;
  }
  .edit-cancel-btn{
    padding:10px 24px;border-radius:999px;border:1px solid var(--line);
    background:transparent;color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer;
  }
  .edit-open-btn{
    font-size:12px;padding:5px 12px;border-radius:999px;
    border:1px solid var(--line);background:transparent;color:var(--ink-soft);
    cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;
  }
  .edit-open-btn:hover{border-color:var(--teal);color:var(--teal);}
  .edit-col-headers{
    display:grid;grid-template-columns:42px 1fr 100px 80px 32px;
    gap:6px;font-size:10px;color:var(--ink-soft);text-transform:uppercase;
    letter-spacing:.06em;margin-bottom:4px;padding:0 2px;
  }

  /* ---------- Photo of the Day ---------- */
  .photo-day{
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:16px;margin-top:14px;box-shadow:var(--shadow);
  }
  .photo-day-header{
    display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;
    flex-wrap:wrap;gap:8px;
  }
  .photo-day-label{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold);font-weight:600;
  }
  .photo-eye-btn{
    padding:5px 14px;border-radius:999px;border:1px solid var(--line);
    background:transparent;color:var(--ink-soft);font-size:12px;
    cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:border-color .15s,color .15s;
  }
  .photo-eye-btn:hover{border-color:var(--teal);color:var(--teal);}
  .photo-img-wrap{text-align:center;}
  .photo-day img{
    width:100%;max-height:420px;border-radius:12px;object-fit:contain;
    display:block;margin:0 auto 12px;border:1px solid var(--line);
    background:#000;
  }
  .photo-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:8px;}
  .photo-upload-btn{
    display:inline-block;padding:10px 24px;border-radius:999px;
    border:1.5px dashed var(--teal);background:transparent;color:var(--teal);
    font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;
    transition:background .15s;min-height:44px;line-height:1;
  }
  .photo-upload-btn:hover{background:rgba(82,191,152,0.09);}
  .photo-empty{color:var(--ink-soft);font-size:13px;margin-bottom:12px;text-align:center;}
  .photo-status{font-size:11px;color:var(--ink-soft);margin-top:8px;font-family:'IBM Plex Mono',monospace;min-height:16px;text-align:center;}
  @media(max-width:480px){
    .photo-day img{max-height:280px;}
    .photo-upload-btn{width:100%;text-align:center;}
  }

  .undo-btn{
    margin-top:10px;padding:8px 20px;border-radius:999px;
    border:1.5px solid var(--sky);background:var(--sky-light);
    color:var(--sky);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
    cursor:pointer;transition:background .15s ease;
  }
  .undo-btn:hover{background:rgba(121,172,222,0.28);}
  #undoHost{text-align:center;}
  .reset-day-btn{
    margin-top:14px;padding:10px 24px;border-radius:999px;
    border:1.5px solid var(--rose);background:var(--rose-light);
    color:var(--rose);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
    cursor:pointer;transition:background .15s ease, transform .1s ease;
  }
  .reset-day-btn:hover{background:rgba(217,140,140,0.28);transform:translateY(-1px);}
  #resetHost{text-align:center;}

  /* ---------- Activity Notes ---------- */
  .act-note-area{margin-top:5px;}
  .act-note{
    width:100%;min-height:34px;max-height:110px;
    border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);
    color:var(--ink);border-radius:8px;padding:5px 8px;
    font-size:11.5px;font-family:'Inter',sans-serif;line-height:1.45;
    resize:vertical;box-sizing:border-box;transition:border-color .15s;
  }
  .act-note:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,0.07);}
  .act-note::placeholder{color:rgba(255,255,255,0.25);}
  .note-dot{font-size:11px;margin-left:4px;opacity:0.65;cursor:default;vertical-align:middle;}

  .switchuser-link{
    text-align:center;margin-top:18px;
  }
  .switchuser-link button{
    background:none;border:none;color:var(--ink-soft);text-decoration:underline;cursor:pointer;
    font-family:'IBM Plex Mono',monospace;font-size:11px;
  }

  @media (max-width:680px){
    .duo-medallions{grid-template-columns:1fr;}
    .duo-stats{grid-template-columns:1fr;}
    .stats{grid-template-columns:1fr 1fr 1fr;}
  }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="ringGradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#52BF98"/><stop offset="100%" stop-color="#E3B765"/>
    </linearGradient>
    <linearGradient id="ringGradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D98C8C"/><stop offset="100%" stop-color="#E3B765"/>
    </linearGradient>
  </defs>
</svg>

<div class="wrap">
  <header class="top">
    <div class="eyebrow">Track My Day</div>
    <h1>🔥 Streaks</h1>
    <div class="syncbadge" id="syncBadge"><span class="dot local"></span> Connecting…</div>
  </header>

function resizeImage(file, maxPx=1080){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = ev => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > maxPx || h > maxPx){
          if(w >= h){ h = Math.round(h * maxPx / w); w = maxPx; }
          else { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadToDrive(user, date, base64, onProgress){
  const CHUNK = 7000; // chars per GET request (safe for Apps Script URL limit)
  const chunks = [];
  for(let i = 0; i < base64.length; i += CHUNK) chunks.push(base64.slice(i, i + CHUNK));
  const total   = chunks.length;
  const session = `${user.replace(/\W/g,'_')}_${date}_${Date.now()}`;
  let finalUrl  = null;

  for(let i = 0; i < total; i++){
    onProgress(i + 1, total);
    const url = `${API_URL}?action=uploadChunk` +
      `&session=${encodeURIComponent(session)}` +
      `&index=${i}&total=${total}` +
      `&user=${encodeURIComponent(user)}&date=${date}` +
      `&chunk=${encodeURIComponent(chunks[i])}` +
      `&key=${API_SECRET}`;
    const res  = await fetch(url);
    if(!res.ok) throw new Error('Network error on chunk ' + i);
    const json = await res.json();
    if(!json.ok) throw new Error(json.error || 'Chunk ' + i + ' rejected');
    if(json.done) finalUrl = json.url;
  }
  if(!finalUrl) throw new Error('Upload finished but no URL returned');
  return finalUrl;
}

function wireUploadInput(iso){
  const input = document.getElementById('photoInput');
  if(!input) return;
  input.addEventListener('change', async ev => {
    const file = ev.target.files[0];
    if(!file) return;
    const status = document.getElementById('photoStatus');
    // Disable the label while uploading
    const label = input.closest('label');
    if(label) label.style.pointerEvents = 'none';
    status.textContent = 'Resizing image…';
    try{
      const base64 = await resizeImage(file);
      const totalChunks = Math.ceil(base64.length / 7000);
      const imgUrl = await uploadToDrive(currentUser, iso, base64, (done, total) => {
        status.textContent = `Uploading to Drive… ${done}/${total}`;
      });
      localSetPhotoUrl(currentUser, iso, imgUrl);
      status.textContent = '✓ Saved to Google Drive';
      setTimeout(() => { photoVisible = true; renderPhotoDay(); }, 800);
    }catch(err){
      status.textContent = '⚠ ' + err.message;
      if(label) label.style.pointerEvents = '';
    }
  });
}

function startOfWeek(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}
function weeksBetween(targetDate){
  const a = startOfWeek(targetDate);
  const b = startOfWeek(new Date());
  return Math.round(Math.round((a - b) / 86400000) / 7);
}
function formatISO(d){
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function getWeekDates(){
  const base = startOfWeek(new Date());
  base.setDate(base.getDate() + weekOffset*7);
  const dates = [];
  for(let i=0;i<7;i++){ const d = new Date(base); d.setDate(base.getDate()+i); dates.push(d); }
  return dates;
}
function applicableCount(dayIdx, user){
  return getActivities(user).filter(a => !a.fridayOnly || dayIdx === 4).length;
}

/* ---------------- Gate / user selection ---------------- */
document.getElementById('pickA').addEventListener('click', () => selectUser(USER_A_NAME));
document.getElementById('pickB').addEventListener('click', () => selectUser(USER_B_NAME));
document.getElementById('switchUserBtn').addEventListener('click', () => {

  document.getElementById('gate').style.display = 'block';
});
document.getElementById('renameLink').addEventListener('click', () => {
  alert("To set your two names, open this file's code and edit the lines:\n\nconst USER_A_NAME = \"Alex\";\nconst USER_B_NAME = \"Sam\";\n\n...near the top of the <script> section, then save and reopen.");

function selectUser(name){
  currentUser = name;
  localStorage.setItem('tracker:lastUser', name);
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  renderSwitcher();
  loadWeek();
}

/* Remember last user on this device */
const remembered = localStorage.getItem('tracker:lastUser');
if(remembered === USER_A_NAME || remembered === USER_B_NAME){
  selectUser(remembered);
}

function renderSwitcher(){
  const names = [USER_A_NAME, USER_B_NAME].sort((a,b) => a === currentUser ? -1 : b === currentUser ? 1 : 0);
  const usersHtml = names.map(name => {
    const cls = name === USER_A_NAME ? 'userA' : 'userB';
    const active = name === currentUser ? ' active' : '';
    const tag = name === currentUser ? '<span class="you-tag">You</span>' : '';
    return `<button class="switch-btn${active}" data-user="${name}"><span class="gate-avatar ${cls}">${name.charAt(0).toUpperCase()}</span>${name} ${tag}</button>`;
  }).join('');

  const modes = ['daily','weekly'];
  const modeHtml = modes.map(mode => {
    const label = mode === 'daily' ? 'Day' : 'Weekly';
    const active = mode === viewMode ? ' active' : '';
    return `<button class="mode-btn${active}" data-mode="${mode}">${label}</button>`;
  }).join('');

  document.getElementById('switcher').innerHTML = `<div class="switcher-users">${usersHtml}<button class="edit-open-btn" id="editOpenBtn">✏️ Edit my activities</button></div><div class="switcher-modes">${modeHtml}</div>`;
  document.querySelectorAll('.switch-btn').forEach(btn => {
    btn.addEventListener('click', () => selectUser(btn.dataset.user));
  });
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if(viewMode !== btn.dataset.mode){
        viewMode = btn.dataset.mode;
        if(viewMode === 'weekly'){
          weekOffset = weeksBetween(selectedDate);
        }
        renderSwitcher();
        loadWeek();
      }
    });
  });
  document.getElementById('editOpenBtn').addEventListener('click', openEditModal);
}

/* --------- Edit Activities Modal --------- */
function openEditModal(){
  document.getElementById('editModalTitle').textContent = `Edit ${currentUser}'s Activities`;
  const acts = getActivities(currentUser);
  renderEditRows(acts);
  document.getElementById('editModalOverlay').classList.remove('hidden');
}

function renderEditRows(acts){
  document.getElementById('editRows').innerHTML = acts.map((act, idx) => `
    <div class="edit-row" data-idx="${idx}">
      <input class="edit-icon-inp" type="text" value="${act.icon}" maxlength="2" placeholder="🌙">
      <input type="text" value="${act.label}" placeholder="Activity name">
      <input type="text" value="${act.time}" placeholder="Time">
      <select class="edit-cat-sel">
        <option value="worship"${act.cat==='worship'?' selected':''}>Worship</option>
        <option value="study"${act.cat==='study'?' selected':''}>Study</option>
        <option value="friday"${act.cat==='friday'?' selected':''}>Friday</option>
      </select>
      <button class="edit-del-btn" data-idx="${idx}">✕</button>
    </div>
  `).join('');

  document.querySelectorAll('.edit-del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const acts = getCurrentEditedActivities();
      acts.splice(Number(btn.dataset.idx), 1);
      renderEditRows(acts);
    });
  });
}

function getCurrentEditedActivities(){
  const defaultActs = getActivities(currentUser);
  return Array.from(document.querySelectorAll('#editRows .edit-row')).map((row, idx) => {
    const inputs = row.querySelectorAll('input');
    const sel = row.querySelector('select');
    const existingId = defaultActs[idx] ? defaultActs[idx].id : `${currentUser.toLowerCase()}_custom_${Date.now()}_${idx}`;
    return {
      id: existingId,
      icon: inputs[0].value || '⭐',
      label: inputs[1].value || 'Activity',
      time: inputs[2].value || '',
      cat: sel.value,
      section: defaultActs[idx] ? defaultActs[idx].section : false,
      fridayOnly: sel.value === 'friday',
    };
  });
}

document.getElementById('editAddBtn').addEventListener('click', () => {
  const acts = getCurrentEditedActivities();
  acts.push({ id:`${currentUser.toLowerCase()}_custom_${Date.now()}`, icon:'⭐', label:'New Activity', time:'', cat:'worship' });
  renderEditRows(acts);
});

document.getElementById('editSaveBtn').addEventListener('click', () => {
  const acts = getCurrentEditedActivities();
  localStorage.setItem(`custom_activities:${currentUser}`, JSON.stringify(acts));
  document.getElementById('editModalOverlay').classList.add('hidden');
  render();
});

document.getElementById('editCancelBtn').addEventListener('click', () => {
  document.getElementById('editModalOverlay').classList.add('hidden');
});

document.getElementById('editModalOverlay').addEventListener('click', (e) => {
  if(e.target === document.getElementById('editModalOverlay')){
    document.getElementById('editModalOverlay').classList.add('hidden');
  }
});

/* --------- Load / Save --------------- */
async function loadWeek(){
  document.getElementById('tableHost').innerHTML = '<div class="loading">Loading your week…</div>';
  document.getElementById('tableHost').className = 'loading';
  document.getElementById('errorHost').innerHTML = '';

  const dates = getWeekDates();
  const start = formatISO(dates[0]), end = formatISO(dates[6]);
  weekDataA = {}; weekDataB = {};
  dates.forEach(d => { weekDataA[formatISO(d)] = new Set(); weekDataB[formatISO(d)] = new Set(); });

  if(configured()){
    const cacheKey = `${start}:${end}`;
    const hit = apiCache[cacheKey];
    let data = null;
    if(hit && (Date.now() - hit.time) < 60000){
      data = hit.data;
      usingCloud = true;
      setSyncBadge('cloud', `Synced to shared sheet — ${USER_A_NAME} &amp; ${USER_B_NAME}`);
    } else {
      try{
        data = await apiGetWeekBoth(start, end);
        apiCache[cacheKey] = { data, time: Date.now() };
        usingCloud = true;
        setSyncBadge('cloud', `Synced to shared sheet — ${USER_A_NAME} &amp; ${USER_B_NAME}`);
      }catch(err){
        usingCloud = false;
        setSyncBadge('err', 'Could not reach the shared sheet — showing local data only');
        dates.forEach(d => {
          const iso = formatISO(d);
          weekDataA[iso] = new Set(localGet(USER_A_NAME, iso));
          weekDataB[iso] = new Set(localGet(USER_B_NAME, iso));
        });
        render(); return;
      }
    }
    if(data){
      dates.forEach(d => {
        const iso = formatISO(d);
        weekDataA[iso] = new Set((data[USER_A_NAME] && data[USER_A_NAME][iso]) || []);
        weekDataB[iso] = new Set((data[USER_B_NAME] && data[USER_B_NAME][iso]) || []);
        // Trust the sheet — don't fill from localStorage (so sheet deletions are respected)
        localSet(USER_A_NAME, iso, Array.from(weekDataA[iso]));
        localSet(USER_B_NAME, iso, Array.from(weekDataB[iso]));
      });
    }
  } else {
    usingCloud = false;
    setSyncBadge('local', 'Backend not connected yet — saving on this device only');
    dates.forEach(d => {
      const iso = formatISO(d);
      weekDataA[iso] = new Set(localGet(USER_A_NAME, iso));
      weekDataB[iso] = new Set(localGet(USER_B_NAME, iso));
    });
  }

  render();
}

function setSyncBadge(kind, text){
  document.getElementById('syncBadge').innerHTML = `<span class="dot ${kind}"></span> ${text}`;
}

async function toggleActivity(iso, activityId, dayIdx, who){
  const act = getActivities(who).find(a => a.id === activityId);
  if(!act || (act.fridayOnly && dayIdx !== 4)) return;
  if(who !== currentUser) return; // can only edit your own

  const set = who === USER_A_NAME ? weekDataA[iso] : weekDataB[iso];
  if(!set) return;
  const wasChecked = set.has(activityId);
  lastAction = { who, iso, activityId, wasChecked };
  if(wasChecked) set.delete(activityId); else set.add(activityId);

  renderLight();
  renderUndoBtn();

  // ALWAYS use localStorage for now (backend sync has network issues)
  localSet(who, iso, Array.from(set));
  
  if(usingCloud){
    setSyncBadge('local', 'Saving…');
    try{
      await apiSaveDay(who, iso, Array.from(set));
      setSyncBadge('cloud', `Saved ✓ — ${USER_A_NAME} &amp; ${USER_B_NAME}`);
      setTimeout(() => setSyncBadge('cloud', `Synced to shared sheet — ${USER_A_NAME} &amp; ${USER_B_NAME}`), 2000);
    }catch(err){
      console.error('Cloud save failed:', err);
      setSyncBadge('err', 'Save failed: ' + err.message);
      usingCloud = false;
    }
  }
}

function dayCompletionPct(set, dayIdx, user){
  const total = applicableCount(dayIdx, user);
  return total ? Math.round((set.size/total)*100) : 0;
}

/* ---------------- Render ---------------- */
function getDisplayDates(){
  if(viewMode === 'daily'){
    return [new Date(selectedDate)];
  }
  return getWeekDates();
}

function formatSingleDay(d){
  return `${DAY_NAMES[d.getDay()]} ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function render(){
  const dates = getDisplayDates();
  const rangeStr = viewMode === 'daily'
    ? formatSingleDay(dates[0])
    : (() => {
      const first = dates[0], last = dates[6];
      const sameMonth = first.getMonth() === last.getMonth();
      return sameMonth
        ? `${MONTH_NAMES[first.getMonth()]} ${first.getDate()}–${last.getDate()}, ${last.getFullYear()}`
        : `${MONTH_NAMES[first.getMonth()]} ${first.getDate()} – ${MONTH_NAMES[last.getMonth()]} ${last.getDate()}, ${last.getFullYear()}`;
    })();
  document.getElementById('weekRange').textContent = rangeStr;
  document.getElementById('datePicker').value = formatISO(selectedDate);

  let thead = '<thead><tr><th>Activity</th>';
  dates.forEach(d => {
    const iso = formatISO(d);
    const isToday = iso === todayISO;
    const dayIdx = (d.getDay() + 6) % 7; // Mon=0 … Sun=6
    thead += `<th class="daycol${isToday ? ' today':''}">${DAY_NAMES[dayIdx]}<br><span style="font-weight:400;">${d.getDate()}</span></th>`;
  });
  thead += '</tr></thead>';

  let tbody = '<tbody>';
  const labelDate = formatISO(dates[0]);
  getActivities(currentUser).forEach(act => {
    const displayLabel = getLabel(act.id, labelDate);
    tbody += `<tr class="${act.section ? 'section-start':''}" data-act="${act.id}">`;
    let noteHtml = '';
    if(viewMode === 'daily'){
      const iso = formatISO(dates[0]);
      const note = localGetNote(currentUser, iso, act.id);
      noteHtml = `<div class="act-note-area"><textarea class="act-note" data-iso="${iso}" data-actid="${act.id}" placeholder="Add a note…">${escapeHtml(note)}</textarea></div>`;
    } else {
      const hasNote = dates.some(d => localGetNote(currentUser, formatISO(d), act.id));
      if(hasNote) noteHtml = `<span class="note-dot" title="Notes added this week">💬</span>`;
    }
    tbody += `<td class="activity"><div class="act-row"><div class="act-icon ${act.cat}">${act.icon}</div><div class="act-text"><div class="act-label">${displayLabel}</div><div class="act-time">${act.time}</div>${noteHtml}</div></div></td>`;
    dates.forEach(d => {
      const iso = formatISO(d);
      const dayIdx = (d.getDay() + 6) % 7; // Mon=0 … Sun=6
      const disabled = act.fridayOnly && dayIdx !== 4;
      let cell = '';
      if(disabled){
        cell = `<div class="toggle-pair"><button class="toggle disabled" disabled aria-label="Not applicable"></button></div>`;
      } else {
        const checked = currentUser === USER_A_NAME
          ? (weekDataA[iso] && weekDataA[iso].has(act.id))
          : (weekDataB[iso] && weekDataB[iso].has(act.id));
        cell = `<div class="toggle-pair">
          <button class="toggle ${act.cat}${checked?' checked':''} self" data-iso="${iso}" data-id="${act.id}" data-day="${dayIdx}" data-who="${currentUser}" title="${currentUser}" aria-label="${act.label} ${currentUser} ${DAY_NAMES[dayIdx]}">${checked ? '✓':''}</button>
        </div>`;
      }
      if(act.id === 'ibrahim_maghrib'){
        cell += `<span class="maghrib-note">${MAGHRIB_NOTE}</span>`;
      }
      tbody += `<td>${cell}</td>`;
    });
    tbody += '</tr>';
  });
  tbody += '</tbody>';

  const host = document.getElementById('tableHost');
  host.className = '';
  host.innerHTML = `<table>${thead}${tbody}</table>`;

  host.querySelectorAll('.toggle:not(.disabled)').forEach(btn => {
    btn.addEventListener('click', () => {
      toggleActivity(btn.dataset.iso, btn.dataset.id, Number(btn.dataset.day), btn.dataset.who);
    });
  });

  let _noteSaveTimer = null;
  host.querySelectorAll('.act-note').forEach(ta => {
    ta.addEventListener('input', () => {
      clearTimeout(_noteSaveTimer);
      _noteSaveTimer = setTimeout(() => {
        localSetNote(currentUser, ta.dataset.iso, ta.dataset.actid, ta.value.trim());
      }, 400);
    });
  });

  renderDuoMedallions();
  renderDuoStats();
  renderQuote();
  renderResetBtn();
  renderPhotoDay();
}

function renderLight(){
  document.querySelectorAll('#tableHost .toggle:not(.disabled)').forEach(btn => {
    const iso = btn.dataset.iso, id = btn.dataset.id, who = btn.dataset.who;
    const set = who === USER_A_NAME ? weekDataA[iso] : weekDataB[iso];
    const checked = set && set.has(id);
    btn.classList.toggle('checked', checked);
    btn.textContent = checked ? '✓' : '';
  });
  renderDuoMedallions();
  renderDuoStats();
}

function renderDuoMedallions(){
  const dates = getWeekDates();
  const circ = 2 * Math.PI * 16;

  function panelHTML(name, dataMap, cls){
    let inner = '';
    dates.forEach((d,i)=>{
      const iso = formatISO(d);
      const set = dataMap[iso] || new Set();
      const pct = dayCompletionPct(set, i, name);
      const dash = (pct/100) * circ;
      const isToday = iso === todayISO;
      inner += `
        <div class="medal${isToday?' today':''}">
          <div class="dayname">${DAY_NAMES[i]}</div>
          <div class="ringwrap ${cls}">
            <svg viewBox="0 0 36 36" width="38" height="38">
              <circle class="track" cx="18" cy="18" r="16"/>
              <circle class="prog" cx="18" cy="18" r="16" stroke-dasharray="${dash} ${circ}"/>
            </svg>
            <div class="pct">${pct}%</div>
          </div>
        </div>`;
    });
    const isActive = name === currentUser;
    const badge = isActive ? '<span class="you-badge">You</span>' : '';
    return `<div class="person-panel ${cls}${isActive ? ' active-panel' : ''}">
      <div class="person-title"><span class="gate-avatar ${cls}">${name.charAt(0).toUpperCase()}</span>${name}${badge}</div>
      <div class="medallions">${inner}</div>
    </div>`;
  }

  document.getElementById('duoMedallions').innerHTML =
    panelHTML(USER_A_NAME, weekDataA, 'userA') +
    panelHTML(USER_B_NAME, weekDataB, 'userB');
}

function statsFor(dataMap, user){
  const dates = getWeekDates();
  let totalDone=0, totalPossible=0, worshipDone=0, worshipTotal=0, studyDone=0, studyTotal=0;
  dates.forEach((d,i)=>{
    const iso = formatISO(d);
    const set = dataMap[iso] || new Set();
    getActivities(user).forEach(act => {
      if(act.fridayOnly && i !== 4) return;
      totalPossible++;
      const done = set.has(act.id);
      if(done) totalDone++;
      if(act.cat==='study'){ studyTotal++; if(done) studyDone++; }
      else { worshipTotal++; if(done) worshipDone++; }
    });
  });
  return {
    overall: totalPossible ? Math.round((totalDone/totalPossible)*100) : 0,
    worship: worshipTotal ? Math.round((worshipDone/worshipTotal)*100) : 0,
    study: studyTotal ? Math.round((studyDone/studyTotal)*100) : 0
  };
}

function renderDuoStats(){
  const sA = statsFor(weekDataA, USER_A_NAME);
  const sB = statsFor(weekDataB, USER_B_NAME);
  document.getElementById('duoStats').innerHTML = `
    <div class="statcard">
      <div class="person-title" style="justify-content:center;margin-bottom:10px;font-size:13px;">
        <span class="gate-avatar userA" style="width:26px;height:26px;font-size:12px;">${USER_A_NAME.charAt(0)}</span>${USER_A_NAME}
      </div>
      <div class="big">${sA.overall}%</div><div class="lbl">Overall</div>
    </div>
    <div class="statcard">
      <div class="person-title" style="justify-content:center;margin-bottom:10px;font-size:13px;">
        <span class="gate-avatar userB" style="width:26px;height:26px;font-size:12px;">${USER_B_NAME.charAt(0)}</span>${USER_B_NAME}
      </div>
      <div class="big" style="color:var(--rose);">${sB.overall}%</div><div class="lbl">Overall</div>
    </div>
  `;
}

function resetDay(iso){
  const set = currentUser === USER_A_NAME ? weekDataA[iso] : weekDataB[iso];
  set.clear();
  localSet(currentUser, iso, []);
  Object.keys(apiCache).forEach(k => delete apiCache[k]);
  if(usingCloud) apiSaveDay(currentUser, iso, []).catch(()=>{});
  renderLight();
  renderResetBtn();
}

function renderResetBtn(){
  const host = document.getElementById('resetHost');
  if(viewMode === 'daily'){
    const iso = formatISO(selectedDate);
    host.innerHTML = `<button class="reset-day-btn" id="resetDayBtn">Reset this day</button>`;
    document.getElementById('resetDayBtn').addEventListener('click', () => resetDay(iso));
  } else {
    host.innerHTML = '';
  }
}

function renderUndoBtn(){
  const host = document.getElementById('undoHost');
  if(lastAction){
    host.innerHTML = `<button class="undo-btn" id="undoBtn">↩ Undo last toggle</button>`;
    document.getElementById('undoBtn').addEventListener('click', () => {
      const { who, iso, activityId, wasChecked } = lastAction;
      const set = who === USER_A_NAME ? weekDataA[iso] : weekDataB[iso];
      if(wasChecked) set.add(activityId); else set.delete(activityId);
      localSet(who, iso, Array.from(set));
      if(usingCloud) apiSaveDay(who, iso, Array.from(set)).catch(()=>{});
      lastAction = null;
      renderLight();
      renderUndoBtn();
    });
  } else {
    host.innerHTML = '';
  }
}

function renderQuote(){
  const d = selectedDate;
  const dayOfYear = Math.floor((d - new Date(d.getFullYear(),0,0)) / 86400000);
  const q = DAILY_QUOTES[dayOfYear % DAILY_QUOTES.length];
  document.getElementById('quoteCard').innerHTML =
    `<div class="quote-arabic">${q.arabic}</div>` +
    `<div class="quote-english">"${q.english}"</div>` +
    `<div class="quote-ref">${q.ref}</div>`;
}

/* ---------------- Nav events ---------------- */
document.getElementById('prevBtn').addEventListener('click', () => {
  if(viewMode === 'daily'){
    selectedDate.setDate(selectedDate.getDate() - 1);
    const newOffset = weeksBetween(selectedDate);
    if(newOffset === weekOffset){ render(); return; }
    weekOffset = newOffset;
  } else {
    weekOffset--; selectedDate.setDate(selectedDate.getDate() - 7);
  }
  loadWeek();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if(viewMode === 'daily'){
    selectedDate.setDate(selectedDate.getDate() + 1);
    const newOffset = weeksBetween(selectedDate);
    if(newOffset === weekOffset){ render(); return; }
    weekOffset = newOffset;
  } else {
    weekOffset++; selectedDate.setDate(selectedDate.getDate() + 7);
  }
  loadWeek();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  if(viewMode === 'daily'){
    selectedDate = new Date();
    const newOffset = weeksBetween(selectedDate);
    if(newOffset === weekOffset){ render(); return; }
    weekOffset = newOffset;
  } else {
    weekOffset = 0; selectedDate = new Date();
  }
  loadWeek();
});
document.getElementById('datePicker').addEventListener('change', (e) => {
  const val = e.target.value;
  if(!val) return;
  const [y,m,d] = val.split('-').map(Number);
  selectedDate = new Date(y, m-1, d);
  weekOffset = weeksBetween(selectedDate);
  loadWeek();
});

if(!configured()){
  setSyncBadge('local', 'Backend not connected yet — open the file and paste your Apps Script URL');
}
</script>
